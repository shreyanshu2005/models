# QBEAST-AI.N — Central configuration
# All monetary constants, dates, symbols, and HP search spaces live here.
# -----------------------------------------------------------------------
# ── Project identity ────────────────────────────────────────
project:
  name: "QBEAST-AI.N"
  version: "1.0.0"
  description: "3-Model Quant Pipeline: SVM + CNN-LSTM + SAC on 10 NSE EOD symbols"

# ── Universe ──────────────────────────────────────────────────────────
universe:
  symbols:
    large_cap: [RELIANCE, HDFCBANK, BAJFINANCE, MARUTI, HEROMOTOCO]
    mid_cap:   [ABB, BOSCHLTD, MOTHERSON, BRITANNIA, INDIGO]
  universe_start: "2016-01-01"
  train_end:      "2019-12-31"
  backtest_start: "2020-01-01"
  backtest_end:   "2026-06-30"

# ── Transaction cost constants ─────────────────────────────────────────
costs:
  tx_rate_per_leg:  0.0011   # 0.11 % of trade value, deducted on BOTH buy AND sell
  stcg_rate:        0.20     # 20 % on net realised gains within holding year
  risk_free_annual: 0.065    # 91-day Indian T-bill approximation

# ── Data paths ────────────────────────────────────────────────────────
paths:
  raw_data:      "data/raw"
  processed:     "data/processed"
  regime_out:    "data/regime"
  results:       "results"
  models_dir:    "models"

# ── Calendar / purging ────────────────────────────────────────────────
calendar:
  purge_days:         30    # trading-day purge gap between train-end and val-start
  embargo_days:       10    # additional days embargoed after each fold end
  walk_forward_days:  21    # one calendar month ≈ 21 trading days

# ── Regime engine (HMM + Vol band) ───────────────────────────────────
regime:
  n_states:              5        # Rising=0, Rally=1, Sideways=2, Falling=3, Crashing=4
  hmm_kappa:             10       # sticky self-transition prior
  hmm_features:          [log_return, realized_vol_20d, momentum_z_10d]
  hmm_warmup_start:      "2010-01-01"
  hmm_initial_fit_end:   "2019-12-31"
  hmm_refit_freq:        bimonthly
  kl_drift_threshold:    0.10     # trigger FAST re-search if HMM drift exceeds this
  vol_band_window:       20       # days for realized vol calculation
  vol_band_pct_window:   252      # days for rolling percentile rank
  low_pct:               0.33
  high_pct:              0.67
  # Regime scalar for SAC drawdown penalty
  drawdown_scalars:
    Rising:    1.0
    Rally:     1.0
    Sideways:  1.2
    Falling:   2.0
    Crashing:  5.0

# ── Feature engineering ───────────────────────────────────────────────
features:
  zscore_window:            252
  forward_days:             5       # CNN-LSTM & SVM label horizon
  svm_n_features:           25      # base (15) + regime dims (10)
  cnn_channels:             22
  cnn_lstm_lookback_default: 30
  signal_threshold_pct:     0.005   # ±0.5 % net-of-costs for CNN-LSTM signal
  winsorize_sigma:          3.0
  ffill_limit:              3

# ── SVM hyperparameter search ─────────────────────────────────────────
svm_hp:
  n_trials_full:   50      # Optuna trials (quarterly re-search)
  n_trials_fast:   30      # Optuna trials (monthly, FAST params only)
  n_cv_folds:      5
  # Search space
  C_low:           0.01
  C_high:          200.0
  gamma_low:       1.0e-4
  gamma_high:      2.0
  kernel:          rbf      # fixed
  class_weight:    balanced  # fixed
  # Cap-segment specific C range hints (used as Optuna priors)
  large_cap_C_min: 10.0
  large_cap_C_max: 100.0
  mid_cap_C_min:   0.1
  mid_cap_C_max:   10.0
  # Recalibration schedule
  fast_params:     [C, gamma]       # re-searched quarterly
  slow_params:     [kernel, class_weight]  # re-searched semi-annually

# ── CNN-LSTM hyperparameter search ────────────────────────────────────
cnn_lstm_hp:
  signal_threshold_pct: 0.005
  n_trials_full:   20
  n_trials_fast:   10
  # Architecture slow params (semi-annual)
  filters_conv1_low:  16
  filters_conv1_high: 64
  filters_conv2_low:  32
  filters_conv2_high: 96
  kernel_size_low:    2
  kernel_size_high:   5
  lstm_units_low:     32
  lstm_units_high:    96
  batch_size_options: [32, 64, 128]
  # FAST params (quarterly)
  lookback_low:       20
  lookback_high:      60
  dropout_low:        0.2
  dropout_high:       0.5
  recurrent_dropout_low:  0.1
  recurrent_dropout_high: 0.3
  lr_low:             1.0e-4
  lr_high:            1.0e-3
  # Training
  early_stopping_patience: 15
  finetune_epochs:    5
  finetune_window:    63    # most-recent trading days for per-symbol head fine-tune
  recent_weight:      2.0   # sample_weight multiplier for most-recent 63 days

# ── SAC hyperparameter search ─────────────────────────────────────────
sac_hp:
  # FAST params (quarterly)
  gamma_low:      0.97
  gamma_high:     0.99
  lambda_dd_low:  0.5
  lambda_dd_high: 5.0
  lambda_turn_low:  0.01
  lambda_turn_high: 0.05
  max_pos_lc_base:  0.30   # large-cap base position cap
  max_pos_mc_base:  0.20   # mid-cap base position cap
  hv_reduction:     0.67   # multiply base cap when in HV band
  # SLOW params (semi-annual)
  tau_low:          5.0e-3
  tau_high:         1.0e-2
  replay_buffer_low:  100000
  replay_buffer_high: 500000
  hidden_dims:      [256, 256]
  monthly_update_steps: 10000

# ── Ensemble fusion ───────────────────────────────────────────────────
fusion:
  min_agreement:      2     # minimum models that must agree for a trade
  cooldown_days:      5     # trading-day lock after any fill
  max_monthly_roundtrips:
    Rising:    2
    Rally:     2
    Sideways:  1
    Falling:   1
    Crashing:  0

# ── Drift sentinel ────────────────────────────────────────────────────
sentinel:
  eval_window:      63      # trading days
  sharpe_drift_thr: 0.5     # σ deviation triggers HP re-search
  hitrate_drop_thr: 0.10    # 10 pp below backtest hit-rate triggers re-search
  min_oos_sharpe:   0.0     # gate: new model must achieve this to replace prior

metrics:
  sharpe_trading_days: 252
  mape_min_abs_return: 0.001
  beta_window_days: 252
