# ============================================================
# QBEAST-AI.N  ·  Global Configuration
# Three-Model Quant Pipeline: SVM + CNN-LSTM + SAC
# ============================================================

# ── Project identity ────────────────────────────────────────
project:
  name: "QBEAST-AI.N"
  version: "1.0.0"
  description: "3-Model Quant Pipeline: SVM + CNN-LSTM + SAC on 10 NSE EOD symbols"

# ── Universe ────────────────────────────────────────────────
universe:
  symbols:
    large_cap:
      - RELIANCE    # Energy
      - HDFCBANK    # Banking
      - BAJFINANCE  # NBFC
      - MARUTI      # Auto
      - HEROMOTOCO  # Auto
    mid_cap:
      - BRITANNIA   # FMCG
      - BOSCHLTD    # Auto Ancillary
      - MOTHERSON   # Auto Ancillary
      - ABB         # Capital Goods
      - INDIGO      # Aviation

  all_symbols:
    - RELIANCE
    - HDFCBANK
    - BAJFINANCE
    - MARUTI
    - HEROMOTOCO
    - BRITANNIA
    - BOSCHLTD
    - MOTHERSON
    - ABB
    - INDIGO

  large_cap_symbols:
    - RELIANCE
    - HDFCBANK
    - BAJFINANCE
    - MARUTI
    - HEROMOTOCO

  mid_cap_symbols:
    - BRITANNIA
    - BOSCHLTD
    - MOTHERSON
    - ABB
    - INDIGO

# ── Dates ───────────────────────────────────────────────────
dates:
  universe_start: "2016-01-01"     # Align all 10 (INDIGO from Nov 2015)
  hmm_warmup_start: "2010-01-01"   # NIFTY50 HMM warmup begins here

  # Initial HP search split
  hp_train_start: "2016-01-01"
  hp_train_end:   "2017-12-31"

  # Walk-forward validation (OOS, purged)
  val_start: "2018-01-01"
  val_end:   "2019-12-31"

  # Live backtest
  backtest_start: "2020-01-01"
  backtest_end:   "2026-06-22"

# ── Data paths ──────────────────────────────────────────────
paths:
  raw_data:       "data/raw"
  processed_data: "data/processed"
  regime_data:    "data/regime"
  results:        "results"
  model_artifacts: "artifacts"

  nifty50_files:
    - "data/raw/NIFTY50_Benchmark_20091231_20040101.csv"
    - "data/raw/NIFTY50_Benchmark_20141231_20100101.csv"
    - "data/raw/NIFTY50_Benchmark_20191231_20150101.csv"
    - "data/raw/NIFTY50_Benchmark_20260622_20200101.csv"

# ── Transaction cost constants ───────────────────────────────
costs:
  # Per-leg all-in cost: STT + brokerage + stamp + exchange charges
  tx_rate_per_leg: 0.0011      # 0.11% per leg; round-trip ~0.22%

  # Short-term capital gains tax rate (< 12 months holding)
  stcg_rate: 0.20              # 20% on net realised annual gains

  # Annual risk-free rate for Sharpe computation (91-day T-bill proxy)
  risk_free_annual: 0.065      # 6.5% p.a.

# ── Position sizing limits ──────────────────────────────────
position_limits:
  # Max fraction of portfolio per name
  large_cap_max: 0.30    # RELIANCE, HDFCBANK, BAJFINANCE, MARUTI, HEROMOTOCO
  mid_cap_max:   0.20    # ABB, BOSCHLTD, MOTHERSON, BRITANNIA, INDIGO

  # Override during HV vol regime (all caps reduced)
  hv_reduction_factor: 0.67  # e.g. 30% → 20%

# ── Regime engine (HMM) ─────────────────────────────────────
regime:
  n_states: 5
  state_labels:
    0: "Rising"
    1: "Rally"
    2: "Sideways"
    3: "Falling"
    4: "Crashing"

  # HMM input features
  hmm_features:
    - "log_return"
    - "realized_vol_20d"
    - "momentum_z_10d"

  # Refit schedule
  refit_frequency: "bimonthly"   # every 2 months
  regime_change_kl_threshold: 0.10  # KL div > 10% → trigger FAST HP re-search

  # Vol-band percentile thresholds (rolling 252-day)
  vol_band:
    low_pct:  33
    high_pct: 67

# ── Feature engineering ─────────────────────────────────────
features:
  # Normalisation window for z-scoring
  zscore_window: 252

  # SVM feature set
  svm_n_features: 25
  svm_lookback_days: 1  # uses daily snapshot, not sequences

  # CNN-LSTM input tensor
  cnn_lstm_lookback_default: 30     # days
  cnn_lstm_lookback_lc_lv:   60     # large-cap, low-vol
  cnn_lstm_lookback_hv:       20    # high-vol (shorter context)
  cnn_lstm_n_channels:        22
  cnn_lstm_target_horizon:    5     # predict 5-day forward return

  # SAC state space
  sac_return_lookback: 20   # last 20 daily returns in state
  sac_state_dims: 35        # approx per symbol

# ── SVM hyperparameter search space ─────────────────────────
svm_hp:
  C_low:    0.1
  C_high:   100.0
  gamma_low:  1.0e-4
  gamma_high: 1.0
  kernel:   "rbf"
  class_weight: "balanced"

  # Cap-segment overrides
  large_cap:
    C_low:   10.0
    C_high:  100.0
  mid_cap:
    C_low:   0.1
    C_high:  10.0

  # Optuna search budget
  optuna_trials: 30
  cv_folds: 5
  purge_days: 30

  # Recalibration schedule
  fast_params: ["C", "gamma"]          # quarterly
  slow_params: ["kernel", "class_weight"]  # semi-annual

# ── CNN-LSTM hyperparameter search space ────────────────────
cnn_lstm_hp:
  filters_conv1:   [16, 32, 64]
  filters_conv2:   [32, 64, 96]
  kernel_size:     [2, 3, 5]
  lstm_units:      [32, 64, 96]
  lookback:        [20, 30, 40, 60]
  dropout:         [0.2, 0.3, 0.4, 0.5]
  recurrent_dropout: [0.1, 0.2, 0.3]
  learning_rate_low:  1.0e-4
  learning_rate_high: 1.0e-3
  batch_size:      [32, 64, 128]

  optuna_trials: 20
  early_stopping_patience: 15
  max_epochs: 200
  gradient_clip: 1.0
  sample_weight_recent: 2.0    # weight recent 63 days 2x

  # Head fine-tune settings (monthly)
  finetune_epochs: 5
  finetune_lookback_days: 63   # ~3 months

  # Signal threshold (net-of-costs 5d return)
  signal_threshold_pct: 0.005  # ±0.5%

# ── SAC hyperparameters ──────────────────────────────────────
sac_hp:
  # Fast params (quarterly re-search)
  gamma_low:  0.97
  gamma_high: 0.99
  lambda_dd_rising:    0.5
  lambda_dd_rally:     0.5
  lambda_dd_sideways:  1.2
  lambda_dd_falling:   2.0
  lambda_dd_crashing:  5.0
  lambda_turnover_low:  0.01
  lambda_turnover_high: 0.05

  # Slow params (semi-annual)
  target_smoothing_tau_low: 5.0e-3
  target_smoothing_tau_high: 1.0e-2
  replay_buffer_size_low:  100000
  replay_buffer_size_high: 500000
  actor_hidden:  [256, 256]
  critic_hidden: [256, 256]

  # Monthly gradient update steps
  monthly_gradient_steps: 10000

  # Position caps (fast param)
  position_cap_normal: 1.0
  position_cap_hv:     0.2

# ── Ensemble fusion ──────────────────────────────────────────
fusion:
  min_agreement: 2           # need ≥2 of 3 signals
  cooldown_days: 5           # min trading days between trades
  regime_flat_states:        # always flat in these regimes
    - "Crashing"
  max_roundtrips_per_month:
    rising:    2
    rally:     2
    sideways:  1
    falling:   1
    crashing:  0

# ── Drift sentinel ───────────────────────────────────────────
sentinel:
  eval_window_days: 63       # ~3 months OOS
  sharpe_deviation_threshold: 0.5   # |live - backtest| > 0.5 sigma
  hit_rate_drop_threshold: 0.10     # >10pp drop → force HP re-search
  min_oos_sharpe: 0.0        # gate: new model deployed only if ≥ 0

# ── NautilusTrader simulation ────────────────────────────────
backtest_engine:
  starting_capital_inr: 10000000   # ₹1 Crore
  venue: "NSE"
  fill_at: "close"          # EOD fill at close price
  prob_fill_on_limit: 1.0
  prob_slippage: 0.0

# ── Walk-forward CV ──────────────────────────────────────────
walk_forward:
  step_days: 21             # 1 month
  purge_gap_days: 30        # prevent label leakage
  embargo_days: 10          # after each fold end

# ── Output metrics ───────────────────────────────────────────
metrics:
  sharpe_trading_days: 252
  mape_min_abs_return: 0.001   # exclude |actual| < 0.1% to avoid div/0
  beta_window_days: 252